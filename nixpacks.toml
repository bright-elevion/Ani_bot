[phases.setup]
nixPkgs = ["python3", "ffmpeg", "curl", "gcc", "gnumake"]

[phases.install]
cmds = [
    "python -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt",
    "curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && chmod a+rx /usr/local/bin/yt-dlp"
]

[start]
cmd = "/opt/venv/bin/python bot.py"
